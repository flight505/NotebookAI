name: Bug report
description: Something doesn't work as documented in CONTRACTS.md
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: Describe the unexpected behavior, including the command or UI flow.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      placeholder: |
        1. notebookai new test
        2. notebookai serve
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: NotebookAI version
      description: "`notebookai version` output"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: macOS / Linux / Windows + version + arch
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      render: shell
