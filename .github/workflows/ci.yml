name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: macos-14
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Pin Python via .python-version
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest tests/ -m "not requires_claude" -v

  frontend:
    name: Frontend (next build)
    # Next.js builds are platform-agnostic; ubuntu-latest runners are ~10×
    # cheaper than macos-14 minutes. The desktop job below stays on macOS
    # because cargo-check needs Apple frameworks for `macos-private-api`.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm build

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Build
        run: pnpm build

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  desktop:
    name: Desktop (cargo check)
    runs-on: macos-14
    timeout-minutes: 25
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      # Swatinem/rust-cache locks on Cargo.lock (when present) and on the
      # full workspace path, so partial dep upgrades reuse the cache instead
      # of bombing back to a cold compile. Replaces the hand-rolled
      # actions/cache@v4 entry that keyed on Cargo.toml only.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Ensure frontend out/ exists for tauri::generate_context!
        run: mkdir -p ../../frontend/out && touch ../../frontend/out/.gitkeep

      - name: cargo check
        run: cargo check --quiet
