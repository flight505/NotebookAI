name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: macos-14
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Pin Python via .python-version
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check

      - name: Pytest
        run: uv run pytest tests/ -m "not requires_claude" -v

  frontend:
    name: Frontend (next build)
    runs-on: macos-14
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build
        run: pnpm build

  desktop:
    name: Desktop (cargo check)
    runs-on: macos-14
    timeout-minutes: 25
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Ensure frontend out/ exists for tauri::generate_context!
        run: mkdir -p ../../frontend/out && touch ../../frontend/out/.gitkeep

      - name: cargo check
        run: cargo check --quiet
